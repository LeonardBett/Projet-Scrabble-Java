help.text=Usage: scrabble [OPTION] [SAVE_FILE]\n\nOptions:\n  -h, --help            Displays this help message and exits\n  -V, --version         Displays the program version and exits\n  -g, --gui             Launches the Graphical User Interface (JavaFX)\n  -s, --super           Launches Super Scrabble mode with a 21x21 board\n  -p N, --players N     Number of players: 2, 3 or 4 (default: 2)\n  -b, --blitz           Launches the game in blitz mode\n  -t TIME, --time TIME  Time limit per player in minutes in blitz mode (default: 30)\n  -l, --lang LANG       Sets dictionary language: 'en' or 'fr'\n                        (default from LC_ALL/LANG, fallback: 'en')\n  --list-languages      Lists supported language codes\n  -D FILE, --dictionary FILE\n                        Uses a custom dictionary file (one word per line)\n  -v, --verbose         Enables verbose logs\n  -d, --debug           Enables debug logs\n\nAI Options:\n  -a COLOR, --ai COLOR  Adds an AI by color (RED/BLUE/YELLOW/GREEN) or A for all\n  -ai-time TIME         Specifies the AI thinking time in seconds (default: 5)\n  -ai-exptiminimax      Enables the Expectiminimax algorithm for best move search\n  --ai-ml               Enables the Machine Learning algorithm for word search\n\nNetwork Options:\n  -S PORT, --server PORT\n                        Starts the server on the specified port\n  --daemon              Starts the server in background (headless mode)\n\nWithout any options, the game starts in terminal mode (CLI) with default parameters.\n\nExamples:\n  java -jar scrabble.jar -l fr             Launches CLI with French dictionary\n  java -jar scrabble.jar --list-languages  Shows available languages\n  java -jar scrabble.jar -D mydict.txt     Uses a custom dictionary\n  java -jar scrabble.jar save.scrabble     Loads a saved game in CLI mode

