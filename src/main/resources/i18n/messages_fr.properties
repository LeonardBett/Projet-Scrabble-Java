help.text=Usage : scrabble [OPTION] [FICHIER_SAVE]\n\nOptions :\n  -h, --help            Affiche ce message d'aide et quitte\n  -V, --version         Affiche la version et quitte\n  -g, --gui             Lance l'interface graphique (JavaFX)\n  -s, --super           Lance le mode Super Scrabble (grille 21x21)\n  -p N, --players N     Nombre de joueurs : 2, 3 ou 4 (defaut : 2)\n  -b, --blitz           Lance une partie en mode blitz\n  -t TIME, --time TIME  Temps par joueur en minutes en blitz (defaut : 30)\n  -l, --lang LANG       Definit la langue du dictionnaire : 'en' ou 'fr'\n                        (defaut via LC_ALL/LANG, repli : 'en')\n  --list-languages      Liste les codes de langues supportees\n  -D FICHIER, --dictionary FICHIER\n                        Utilise un dictionnaire personnalise (un mot par ligne)\n\nOptions IA :\n  -ai-time TIME         Temps de reflexion de l'IA en secondes (defaut : 5)\n  -ai-exptiminimax      Active l'algorithme Expectiminimax\n  --ai-ml               Active l'algorithme Machine Learning\n\nSans option, le jeu demarre en mode terminal (CLI) avec les parametres par defaut.\n\nExemples :\n  java -jar scrabble.jar -l fr             Lance le CLI avec dictionnaire francais\n  java -jar scrabble.jar --list-languages  Affiche les langues disponibles\n  java -jar scrabble.jar -D mondico.txt    Utilise un dictionnaire personnalise\n  java -jar scrabble.jar partie.scrabble   Charge une partie sauvegardee en CLI

