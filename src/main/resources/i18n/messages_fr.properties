help.text.fr=Usage : scrabble [OPTION]\n\nOptions :\n  -h, --help            Affiche ce message d'aide et quitte\n  -V, --version         Affiche la version du programme et quitte\n  -g, --gui             Lance l'interface graphique (JavaFX)\n  -p N, --players N     Nombre de joueurs : 2, 3 ou 4 (defaut : 2)\n  -b, --blitz           Lance la partie en mode blitz\n  -t TIME, --time TIME  Temps par joueur en minutes en mode blitz (defaut : 30)\n  -l, --lang LANG       Definit la langue du dictionnaire : 'en' ou 'fr' (defaut : 'en')\n\nOptions IA :\n  -ai-time TIME         Definit le temps de reflexion de l'IA en secondes (defaut : 5)\n  -ai-exptiminimax      Active l'algorithme Expectiminimax pour la recherche du meilleur coup\n  --ai-ml               Active l'algorithme Machine Learning pour la recherche de mots\n\nSans option, le jeu demarre en mode terminal (CLI) avec les parametres par defaut.\n\nExemples :\n  java -jar scrabble.jar -l fr             Lance en CLI avec le dictionnaire francais\n  java -jar scrabble.jar -b -t 20          Lance en CLI blitz avec 20 min par joueur\n  java -jar scrabble.jar -g -b -t 10       Lance en GUI blitz avec 10 min par joueur\n  java -jar scrabble.jar --ai-ml -l en     Lance en CLI avec ML et modeles anglais
