help.text=Usage : scrabble [OPTION]\n\nOptions :\n  -h, --help            Affiche ce message d'aide et quitte\n  -V, --version         Affiche la version et quitte\n  -g, --gui             Lance l'interface graphique (JavaFX)\n  -s, --super           Lance le mode Super Scrabble (grille 21x21)\n  -p N, --players N     Nombre de joueurs : 2, 3 ou 4 (defaut : 2)\n  -b, --blitz           Lance une partie en mode blitz\n  -t TIME, --time TIME  Temps par joueur en minutes en blitz (defaut : 30)\n  -l, --lang LANG       Definit la langue du dictionnaire : 'en' ou 'fr'\n                        (defaut via LC_ALL/LANG, repli : 'en')\n\nOptions IA :\n  -ai-time TIME         Temps de reflexion de l'IA en secondes (defaut : 5)\n  -ai-exptiminimax      Active l'algorithme Expectiminimax\n  --ai-ml               Active l'algorithme Machine Learning\n\nSans option, le jeu demarre en mode terminal (CLI) avec les parametres par defaut.\n\nExemples :\n  java -jar scrabble.jar -l fr             Lance le CLI avec dictionnaire francais\n  java -jar scrabble.jar -b -t 20          Lance un blitz CLI (20 min/joueur)\n  java -jar scrabble.jar -g -b -t 10       Lance le GUI en blitz (10 min/joueur)\n  java -jar scrabble.jar --ai-ml -l en     Lance CLI + ML avec modeles anglais

